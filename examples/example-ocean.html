<!doctype html>
<html lang="en" data-theme="ocean">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FeatherText – Ocean Theme</title>
  <link rel="stylesheet" href="../feathertext.css">
  <link rel="stylesheet" href="./styles.css">
  <script src="./theme-toggle.js"></script>
  <script src="../feathertext.js"></script>
</head>

<body>
  <header class="header">
    <a class="brand" href="../index.html"><span class="dot"></span>
      <h1>FeatherText Examples</h1>
    </a>
    <nav class="toolbar toolbar-nav" aria-label="Example pages">
      <a class="btn" href="./example.html" data-nav="simple" data-label="Simple">Simple</a>
      <a class="btn" href="./example-basic.html" data-nav="basic" data-label="Basic">Basic</a>
      <a class="btn" href="./example-api.html" data-nav="api" data-label="API">API</a>
      <a class="btn" href="./example-ocean.html" data-nav="ocean" data-label="Ocean" aria-current="page">Ocean</a>
      <a class="btn" href="./config-generator.html" data-nav="config" data-label="Config">Config</a>
    </nav>
    <div class="toolbar">
      <button class="btn btn-theme" type="button" onclick="toggleTheme()" data-theme-toggle>Theme</button>
    </div>
  </header>
  <main class="container">
    <section class="hero">
      <h2>Ocean theme</h2>
      <p class="lead">Full toolbar to showcase features. The page starts in Ocean, but you can toggle themes and keep
        the same polished shell.</p>
    </section>
    <textarea id="ocean"><p>Ocean theme with more tools.</p></textarea>
  </main>
  <footer class="container footer">FeatherText · MIT License</footer>

  <script>
    const [editor] = FeatherText.init('#ocean', {
      theme: document.documentElement.getAttribute('data-theme') || 'ocean',
      autosave: true,
      toolbar: [
        'format', 'fontname', 'fontsize', '|',
        'bold', 'italic', 'underline', 'strikethrough', '|',
        'link', 'unlink', 'image', 'video', 'table', '|',
        'ul', 'ol', 'indent', 'outdent', '|',
        'alignleft', 'aligncenter', 'alignright', 'alignjustify', '|',
        'blockquote', 'code', 'clearformat', 'hr', '|',
        'forecolor', 'backcolor', '|', 'undo', 'redo', '|', 'fullscreen', 'source', 'copy', 'paste'
      ]
    });
    addEventListener('themechange', (e) => editor.setTheme(e.detail));
  </script>
</body>

</html>
