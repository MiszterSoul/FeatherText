<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FeatherText – Simple Example</title>
  <link rel="stylesheet" href="../feathertext.css">
  <link rel="stylesheet" href="./styles.css">
  <script src="./theme-toggle.js"></script>
  <script src="../feathertext.js"></script>
</head>

<body>
  <header class="header">
    <a class="brand" href="../index.html"><span class="dot"></span>
      <h1>FeatherText Examples</h1>
    </a>
    <nav class="toolbar toolbar-nav" aria-label="Example pages">
      <a class="btn" href="./example.html" data-nav="simple" data-label="Simple" aria-current="page">Simple</a>
      <a class="btn" href="./example-basic.html" data-nav="basic" data-label="Basic">Basic</a>
      <a class="btn" href="./example-api.html" data-nav="api" data-label="API">API</a>
      <a class="btn" href="./example-ocean.html" data-nav="ocean" data-label="Ocean">Ocean</a>
      <a class="btn" href="./config-generator.html" data-nav="config" data-label="Config">Config</a>
    </nav>
    <div class="toolbar">
      <button class="btn btn-theme" type="button" onclick="toggleTheme()" data-theme-toggle>Theme</button>
    </div>
  </header>
  <main class="container">
    <section class="hero">
      <h2>Simple editor</h2>
      <p class="lead">A minimal instance with sane defaults. Try switching themes above to see the polished shell in
        action.</p>
    </section>
    <textarea id="desc" name="description" data-placeholder="Write description…">
      <h2>Hello 👋</h2><p>This is a <b>tiny</b> editor.</p>
    </textarea>
  </main>
  <footer class="container footer">FeatherText · MIT License</footer>

  <script>
    const currentTheme = document.documentElement.getAttribute('data-theme') || 'light';
    const [editor] = FeatherText.init('#desc', {
      theme: currentTheme,
      sanitizePaste: true
    });
    // Sync on theme toggle
    addEventListener('themechange', (e) => editor.setTheme(e.detail));
  </script>
</body>

</html>
